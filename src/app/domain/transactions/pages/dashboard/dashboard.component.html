<app-page-header [title]="pageItem.txt" [icon]="pageItem.icon"></app-page-header>

<div class="grid gap-4 sm:gap-6">
  <div class="grid grid-cols-3 gap-4 sm:gap-6">
    <app-card
      title="Balanço"
      [value]="totalIncomings - totalExpenses"
      [description]="'Total mês de ' + dataPickerService.currentDateSignal().format('MMM')"
      [typeRef]="'BALANCO'"
      [showLoader]="showLoader()"
    />
    <app-card
      title="Receitas"
      [value]="totalIncomings"
      [description]="'Total de ' + dataPickerService.currentDateSignal().format('MMM')"
      [typeRef]="'RECEITA'"
      [showLoader]="showLoader()"
    />
    <app-card
      title="Despesas"
      [value]="totalExpenses"
      [description]="'Total de ' + dataPickerService.currentDateSignal().format('MMM')"
      [typeRef]="'DESPESA'"
      [showLoader]="showLoader()"
    />
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-y-4 sm:gap-6">
    <div
      class="box dark:bg-surfaceColorDark dark:border-borderColorDark col-span-1 grid items-center"
    >
      @if (!showLoader()) {
        <apx-chart
          [series]="chartOptionsCategory.series"
          [chart]="chartOptionsCategory.chart"
          [labels]="chartOptionsCategory.labels"
          [legend]="chartOptionsCategory.legend"
          [responsive]="chartOptionsCategory.responsive"
          [stroke]="chartOptionsCategory.stroke"
          [dataLabels]="chartOptionsCategory.dataLabels"
          [plotOptions]="chartOptionsCategory.plotOptions"
          [yaxis]="chartOptionsCategory.yaxis"
          [xaxis]="chartOptionsCategory.xaxis"
        ></apx-chart>
      } @else {
        <div class="relative w-full h-[35rem] bg-gray-100 rounded-md overflow-hidden animate-pulse">
          <div class="absolute inset-0 flex flex-col gap-4 p-6">
            <div class="flex justify-end">
              <div class="w-28 h-8 bg-gray-300 rounded"></div>
            </div>
            <div class="flex-1 bg-gray-200 rounded"></div>
          </div>
        </div>
      }
    </div>

    <div
      class="box dark:bg-surfaceColorDark dark:border-borderColorDark col-span-2 grid items-center"
    >
      @if (!showLoader()) {
        <apx-chart
          [series]="chartOptions.series"
          [chart]="chartOptions.chart"
          [xaxis]="chartOptions.xaxis"
          [stroke]="chartOptions.stroke"
          [tooltip]="chartOptions.tooltip"
          [dataLabels]="chartOptions.dataLabels"
          [grid]="{ show: utilsService.darkModeSignal() ? false : true }"
          [theme]="{ mode: utilsService.darkModeSignal() ? 'dark' : 'light' }"
        ></apx-chart>
      } @else {
        <div class="relative w-full h-[35rem] bg-gray-100 rounded-md overflow-hidden animate-pulse">
          <div class="absolute inset-0 flex flex-col gap-4 p-6">
            <div class="flex justify-end">
              <div class="w-28 h-8 bg-gray-300 rounded"></div>
            </div>
            <div class="flex-1 bg-gray-200 rounded"></div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
