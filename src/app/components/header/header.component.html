<div class="flex items-center justify-end px-10 bg-surfaceColor dark:bg-primaryColor h-[6rem] border-b border-borderColor dark:border-borderColorDark" [ngClass]="{'justify-between': mediaQueryService.isMobile()}">
    @if (mediaQueryService.isMobile()) {
        <div class="w-[16rem] flex justify-center items-center">
            <img src="assets/logo.png" alt="Logo do sistema">
        </div>
    }

    <!-- Actions -->
    <div class="flex items-center gap-6">
        @if (!mediaQueryService.isMobile()) {
            <!-- Mudança para darkmode temporario -->
            <ng-icon class="cursor-pointer text-grayDarkColor dark:text-white hover:text-greenColor transition" 
                [name]="!utilsService.darkModeSignal() ? 'ionSettings' : 'ionSettingsOutline' " 
                size="2.2rem"
                (click)="changeDarkMode()"
            ></ng-icon>
        }
        
        <ng-icon class="cursor-pointer text-grayDarkColor dark:text-white hover:text-greenColor transition" 
            name="lucideLogOut" size="2.2rem" 
            (click)="handleLogout()"
        ></ng-icon>

        <img 
            class="size-[4.5rem] object-cover rounded-full cursor-pointer"
            [ngClass]="{'size-[3.5rem]': mediaQueryService.isMobile()}"
            src="https://images.unsplash.com/photo-1556157382-97eda2d62296?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        >
    </div>
</div>
