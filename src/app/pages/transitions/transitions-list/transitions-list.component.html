<div class="flex flex-col gap-6">
    <label class="text-md text-secundaryColor font-medium">{{ label }}</label>
    <ul class="flex flex-col gap-6">
        @for (transition of transitions; track $index) {
            @if (utilsService.loaders.showTransition()) {
                <li class="box hover:bg-hoverColor transition cursor-pointer" (click)="handleEditTransition(transition)">
                    <div class="flex gap-4 items-center justify-between font-medium">
                        <div class="flex gap-4 items-center">
                            <!-- icon -->
                            <div class="flex items-center justify-center size-[4rem] bg-primaryColor rounded">
                                <ng-icon [name]="transition?.icon" size="2rem" color="#fff"></ng-icon>
                            </div>
                            <!-- Content -->
                            <div class="flex flex-col justify-between h-full">
                                <span>{{transition.nome}}</span>
                                <!-- <p class="text-sm text-secundaryColor">20 jul, 12:30</p> -->
                                <p class="text-sm text-secundaryColor">{{transition.data | date}}</p>
                            </div>
                        </div>
        
                        <div class="flex flex-col items-end">
                            <h2 class="text-greenColor" [ngClass]="{'text-greenColor': typeRef === 'INCOME', 'text-accentColor': typeRef === 'EXPENSE'}">
                                {{transition.valor | currency: 'BRL'}}
                            </h2>
                            <p class="text-sm text-secundaryColor">{{!transition.status ? 'Falta pagar' : 'Pago'}}</p>
                        </div>
                    </div>
                </li>
            } @else {
                <app-item-loader/>
            }
        } @empty {
            <app-item-loader/>
            <!-- <h2>Nenhuma transação para exibir</h2> -->
        }
    </ul>
</div>
