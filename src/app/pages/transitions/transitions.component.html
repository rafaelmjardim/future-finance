<!-- Header -->
<app-page-header
    [title]="pageItem.txt"
    [icon]="pageItem.icon"
/>

<!-- Main -->
 <div class="grid grid-cols-2 gap-[1.6rem]">
    <div class="box">
        <h2 class="box__title">Transações</h2>
    
        <div class="box__content flex flex-col gap-8">
                <app-transitions-list
                    label="Receitas"
                    typeRef="INCOME"
                    [transitions]="incomings"
                />
                <app-transitions-list
                    label="Despesas"
                    typeRef="EXPENSE"
                    [transitions]="expenses"
                />
        </div>
    </div>

    <div class="grid gap-[1.6rem]">
        <div class="box">
            <h2 class="box__title">Resumo</h2>
    
            <div class="grid grid-cols-3 gap-6">
                <app-card title="Balanço" [value]="500" description="Balanço total do mês de x" [typeRef]="'BALANCO'"/>
                <app-card title="Receitas" [value]="2000" description="Receita total do mês de x" [typeRef]="'RECEITA'"/>
                <app-card title="Despesas" [value]="1500" description="Despesa total do mês de x" [typeRef]="'DESPESA'"/>
            </div>
        </div>

        <div class="box">
            <h2 class="box__title">Grafico</h2>

            <app-graph></app-graph>
        </div>
    </div>
 </div>
