@if ((value || value == 0) && !showLoader()) {
  <div
    class="box dark:bg-surfaceColorDark dark:border-borderColorDark py-4"
    [ngClass]="{ 'p-[1rem]': mediaQueryService.isMobile() }"
  >
    <p class="text-md font-medium mb-2 dark:text-white">{{ title }}</p>
    <h2
      class="text-[2.2rem] font-bold mb-1"
      [ngStyle]="{ 'font-size': mediaQueryService.isMobile() ? '1.5rem' : '' }"
      [ngClass]="{
        'text-grayColor': typeRef === 'BALANCO',
        'text-greenColor': typeRef === 'RECEITA',
        'text-accentColor': typeRef === 'DESPESA',
      }"
    >
      {{ value | currency: 'BRL' }}
    </h2>
    <p class="text-sm text-secundaryColor dark:text-labelColorDark">{{ description }}</p>
  </div>
} @else {
  <!-- LOADER SKELETON -->
  <div class="box py-4 flex flex-col gap-4 animate-pulse">
    <div class="h-6 bg-gray-200 rounded w-1/2"></div>
    <div class="h-12 bg-gray-200 rounded w-3/4]"></div>
    <div class="h-5 bg-gray-200 rounded w-full"></div>
  </div>
}
