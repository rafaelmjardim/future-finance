<div class="app bg-backgroundColor" [ngClass]="{'app--login-router': !authService.isLogged()}">

  @if (authService.isLogged()) {
    <div class="app__sidebar">
      <app-sidebar></app-sidebar>
    </div>
  }
  <div class="app__main">
    @if (authService.isLogged()) {
      <app-header></app-header>
    }

    <div class="app__content h-full">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
